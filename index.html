            background: #030c17;

            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border-top: 1px solid #1a3045;
            border-bottom: 1px solid #1a3045;

        .buttons-panel button {

            padding: 10px 8px;

        let chat = document.getElementById("chatArea"); 
        let d = document.createElement("div"); 
        d.className = `msg ${type}`;

        chat.appendChild(d); 
        chat.scrollTop = chat.scrollHeight; 
        if (chat.children.length > 200) chat.removeChild(chat.children[0]);
    }

        player.xp += xpGain; 
        player.glory += gloryGain;
        player.stats.totalGoldEarned += goldGain;
        player.stats.totalKills++;
        if (player.currentEnemy.needKey) player.stats.eliteKills++;
        
        addSys(`🏆 Победа! +${goldGain}💰 +${xpGain}✨ опыта +${gloryGain}✨ славы!`);
        
        let need = 100 + player.level * 12;
        if (player.xp >= need) { 
            player.level++; 
            player.xp = 0; 
            player.maxHp += 20; 
            player.hp = player.maxHp; 
            addSys(`✨ УРОВЕНЬ ${player.level}!`); 
        }
        
        if (player.currentEnemy.key) { 
            let r = Math.random(); 
            if (r < player.currentEnemy.keyChance) { 
                player.keys[player.currentEnemy.key]++; 
                addSys(`🔑 Выпал ${player.currentEnemy.key}!`); 
            } 
        }
        
        if (player.currentEnemy.drops) {
            for (let d of player.currentEnemy.drops) {
                if (Math.random() < d.chance) {
                    if (d.material) { 
                        player.materials[d.material] = (player.materials[d.material] || 0) + d.qty; 
                        addSys(`📦 Материал: +${d.qty} ${d.material}`); 
                    }
                }
            }
        }
        
        player.inBattle = false; 
        if (player.attackInterval) clearInterval(player.attackInterval); 
        player.currentEnemy = null; 
        updateUI(); 
        await autoSaveToCloud();
        await updateLeaderboard();
    }
    
    function enemyAttack() { 
        if (!player.inBattle || !player.currentEnemy) return;
        let dmg = Math.max(6, player.currentEnemy.atk + Math.floor(Math.random() * 14) - Math.floor(player.level * 0.3));
        player.hp -= dmg; 
        addSys(`😖 ${player.currentEnemy.name} атакует! -${dmg} HP. Осталось ${Math.floor(player.hp)}/${player.maxHp}`);
        if (player.hp <= 0) { 
            addSys(`💀 Вы пали... Потеря 20% золота и славы.`); 
            player.gold = Math.floor(player.gold * 0.8); 
            player.glory = Math.floor(player.glory * 0.8); 
            player.hp = player.maxHp; 
            player.inBattle = false; 
            if(player.attackInterval) clearInterval(player.attackInterval); 
            player.currentEnemy = null; 
            autoSaveToCloud();
        }
        updateUI(); 
    }
    
    function startBattle(enemy) { 
        if (player.inBattle) { addSys("Вы уже в бою!"); return; } 
        player.currentEnemy = JSON.parse(JSON.stringify(enemy)); 
        player.inBattle = true; 
        addSys(`⚔️ Бой с ${enemy.name} (❤️ ${enemy.hp} | ⚔️ ${enemy.atk})`); 
        updateUI(); 
    }
    
    function heal() { 
        let cost = 45; 
        if (player.gold >= cost && player.hp < player.maxHp) { 
            player.gold -= cost; 
            player.hp = Math.min(player.maxHp, player.hp + 40 + player.level); 
            addSys(`💚 Лечение +${40+player.level} HP. -${cost}💰.`); 
            autoSaveToCloud();
        } else addSys(`❌ Не хватает.`); 
        updateUI(); 
    }

    function upgradeWeapon() {
        if (!player.class) { addSys("❌ Сначала выберите класс!"); return; }
        if (!player.weapon) { addSys("❌ У вас нет оружия для улучшения!"); return; }
        let currentDmg = player.weapon.dmg;
        let upgradeCost = Math.max(30, Math.floor(currentDmg * 1.5));
        if (player.glory < upgradeCost) {
            addSys(`❌ Не хватает осколков славы! Нужно ${upgradeCost}✨, у вас ${Math.floor(player.glory)}✨`);
            return;
        }
        let roll = Math.random() * 100;
        if (roll < 70) {
            player.glory -= upgradeCost;
            let oldDmg = player.weapon.dmg;
            player.weapon.dmg = Math.floor(player.weapon.dmg + 3);
            addSys(`✅ УСПЕХ! ${player.weapon.name} улучшен с ${oldDmg} до ${player.weapon.dmg} урона! -${upgradeCost}✨`, "achievement");
        } else if (roll < 90) {
            addSys(`⚠️ НЕУДАЧА! Оружие не улучшилось, но осколки славы не потрачены (${upgradeCost}✨ сохранены).`);
            return;
        } else {
            player.glory -= upgradeCost;
            let oldWeaponName = player.weapon.name;
            let defaultWeapon = WEAPONS[player.class][0];
            player.weapon = { name: defaultWeapon.name, dmg: defaultWeapon.dmg };
            addSys(`💥 КРИТИЧЕСКАЯ НЕУДАЧА! ${oldWeaponName} сломалось! Вы потеряли ${upgradeCost}✨ и вернулись к ${player.weapon.name} (+${player.weapon.dmg} урона)`);
        }
        updateUI();
        autoSaveToCloud();
    }

    async function register(username, password) {
        if (!supabase) { addSys("❌ Ошибка подключения"); return false; }
        if (username.length < 3 || username.length > 20) { addSys("❌ Имя 3-20 символов"); return false; }
        if (password.length < 4) { addSys("❌ Пароль минимум 4 символа"); return false; }
        
        try {
            // Проверяем, существует ли пользователь
            const { data: existing } = await supabase
                .from("accounts")
                .select("username")
                .eq("username", username)
                .maybeSingle();
            
            if (existing) {
                addSys("❌ Имя уже занято!");
                return false;
            }
            
            // Простое хеширование (для демо)
            const simpleHash = btoa(password);
            
            const { error } = await supabase
                .from("accounts")
                .insert({ username: username, password_hash: simpleHash, created_at: new Date() });
            
            if (error) throw error;
            
            addSys(`✅ Регистрация успешна! Теперь войдите.`, "achievement");
            return true;
        } catch(e) {
            addSys(`❌ Ошибка: ${e.message}`);
            return false;
        }
    }
    
    async function login(username, password) {
        if (!supabase) { addSys("❌ Ошибка подключения"); return false; }
        
        try {
            const simpleHash = btoa(password);
            
            const { data, error } = await supabase
                .from("accounts")
                .select("*")
                .eq("username", username)
                .eq("password_hash", simpleHash)
                .maybeSingle();
            
            if (error) throw error;
            if (!data) {
                addSys("❌ Неверное имя или пароль");
                return false;
            }
            
            currentUser = { id: data.id, username: username };
            localStorage.setItem("saved_username", username);
            localStorage.setItem("saved_password", btoa(password));
            
            addSys(`✅ Добро пожаловать, ${username}!`, "achievement");
            await loadGameFromCloud();
            updateUI();
            return true;
        } catch(e) {
            addSys(`❌ Ошибка: ${e.message}`);
            return false;
        }
    }

    async function autoSaveToCloud() {
        if (!currentUser || !supabase) return;
        
        try {
            const saveData = {
                class: player.class,
                level: player.level,
                xp: player.xp,
                gold: player.gold,
                glory: player.glory,
                hp: player.hp,
                maxHp: player.maxHp,
                mp: player.mp,
                maxMp: player.maxMp,
                weapon: player.weapon,
                keys: player.keys,
                materials: player.materials,
                stats: player.stats,
                usedPromoCodes: player.usedPromoCodes
            };
            
            await supabase
                .from("game_saves")
                .upsert({ 
                    user_id: currentUser.id, 
                    save_data: saveData,
                    updated_at: new Date().toISOString()
                }, { onConflict: "user_id" });
            
            console.log("✅ Автосохранение");
        } catch(e) {
            console.warn("Ошибка сохранения:", e);
        }
    }
    
    async function loadGameFromCloud() {
        if (!currentUser || !supabase) return false;
        
        try {
            const { data, error } = await supabase
                .from("game_saves")
                .select("save_data")
                .eq("user_id", currentUser.id)
                .maybeSingle();
            
            if (error) throw error;
            
            if (data && data.save_data) {
                const d = data.save_data;
                player.class = d.class || null;
                player.level = d.level || 1;
                player.xp = d.xp || 0;
                player.gold = d.gold || 800;
                player.glory = d.glory || 0;
                player.hp = d.hp || 200;
                player.maxHp = d.maxHp || 200;
                player.mp = d.mp || 50;
                player.maxMp = d.maxMp || 50;
                player.weapon = d.weapon || null;
                if (d.keys) player.keys = { ...player.keys, ...d.keys };
                if (d.materials) player.materials = { ...player.materials, ...d.materials };
                if (d.stats) player.stats = d.stats;
                if (d.usedPromoCodes) player.usedPromoCodes = d.usedPromoCodes;
                
                addSys(`☁️ Прогресс загружен! Уровень ${player.level}`, "achievement");
                updateUI();
                return true;
            } else {
                addSys(`📀 Новый аккаунт! Выберите класс.`, "system");
                showClassSelector();
                return false;
            }
        } catch(e) {
            console.warn("Ошибка загрузки:", e);
            return false;
        }
    }

    function showClassSelector() {
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `<div class="class-selector"><div class="class-btn" id="classWar">⚔️ ВОИН</div><div class="class-btn" id="classMage">🔮 МАГ</div><div class="class-btn" id="classArch">🏹 ЛУЧНИК</div></div>`;
        panel.classList.remove("hidden");
        document.getElementById("classWar").onclick = () => { setClass("warrior"); panel.classList.add("hidden"); };
        document.getElementById("classMage").onclick = () => { setClass("mage"); panel.classList.add("hidden"); };
        document.getElementById("classArch").onclick = () => { setClass("archer"); panel.classList.add("hidden"); };
    }
    
    function showLoginPanel() {
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `
            <div class="login-panel">
                <h3>🔐 ВХОД / РЕГИСТРАЦИЯ</h3>
                <input type="text" id="loginUsername" placeholder="Имя (3-20 символов)">
                <input type="password" id="loginPassword" placeholder="Пароль (мин. 4 символа)">
                <button id="doLoginBtn">🔓 ВОЙТИ</button>
                <button id="doRegisterBtn">📝 РЕГИСТРАЦИЯ</button>
                <button id="closePanel">Закрыть</button>
            </div>
        `;
        panel.classList.remove("hidden");
        
        document.getElementById("doLoginBtn").onclick = async () => {
            let name = document.getElementById("loginUsername").value.trim();
            let pass = document.getElementById("loginPassword").value;
            if (name && pass) {
                await login(name, pass);
                panel.classList.add("hidden");
            } else addSys("❌ Введите имя и пароль");
        };
        
        document.getElementById("doRegisterBtn").onclick = async () => {
            let name = document.getElementById("loginUsername").value.trim();
            let pass = document.getElementById("loginPassword").value;
            if (name && pass) {
                if (await register(name, pass)) {
                    panel.classList.add("hidden");
                }
            } else addSys("❌ Введите имя и пароль");
        };
        
        document.getElementById("closePanel").onclick = () => panel.classList.add("hidden");
    }
    
    // ======================== // ЗАПУСК // ========================
    
    async function tryAutoLogin() {
        let savedName = localStorage.getItem("saved_username");
        let savedPass = localStorage.getItem("saved_password");
        if (savedName && savedPass) {
            await login(savedName, atob(savedPass));
        } else {
            showLoginPanel();
        }
    }
    
    // Привязка кнопок
    document.getElementById("loginBtn").onclick = showLoginPanel;
    document.getElementById("registerBtn").onclick = showLoginPanel;
    document.getElementById("logoutBtn").onclick = logout;
    document.getElementById("questBtn").onclick = () => { if(player.class) showQuests(); else addSys("Выберите класс!"); };
    document.getElementById("bossListBtn").onclick = () => { if(player.class) showBosses(); else addSys("Выберите класс!"); };
    document.getElementById("dailyBossBtn").onclick = dailyBossFight;
    document.getElementById("attackBtn").onclick = attack;
    document.getElementById("autoAttackBtn").onclick = toggleAutoAttack;
    document.getElementById("healBtn").onclick = heal;
    document.getElementById("autoHealBtn").onclick = toggleAutoHeal;
    document.getElementById("shopBtn").onclick = shop;
    document.getElementById("gloryShopBtn").onclick = gloryShop;
    document.getElementById("inventoryBtn").onclick = showInventory;
    document.getElementById("craftBtn").onclick = () => { addSys("⚙️ Крафт в разработке"); };
    document.getElementById("upgradeBtn").onclick = showUpgradeMenu;
    document.getElementById("leaderboardBtn").onclick = showLeaderboard;
    document.getElementById("achievementsBtn").onclick = showAchievements;
    document.getElementById("dailyQuestsBtn").onclick = showDailyQuests;
    document.getElementById("promoBtn").onclick = () => { addSys("🎁 Промокод: WELCOME (+500💰 +100✨)"); };
    document.getElementById("themeBtn").onclick = () => { document.body.classList.toggle("light"); localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark"); };
    document.getElementById("sendBtn").onclick = () => { let inp = document.getElementById("cmdInput"); processCmd(inp.value); inp.value = ""; };
    
    function processCmd(cmd) { 
        let c = cmd.toLowerCase().trim();
        if (c === "очистить") { clearChat(); return; }
        if (c === "статы") { addSys(`Ур.${player.level} ❤️${Math.floor(player.hp)}/${player.maxHp} 🪙${Math.floor(player.gold)} ✨${Math.floor(player.glory)}`); return; }
        if (c === "рейтинг") { showLeaderboard(); return; }
        if (c === "сохранить") { autoSaveToCloud(); addSys("💾 Сохранено!"); return; }
        if (c === "помощь") { addSys(`Команды: статы, рейтинг, сохранить, очистить`); return; }
        addSys(`❓ Неизвестно. "помощь"`); 
    }
    
    function clearChat() {
        let chat = document.getElementById("chatArea");
        chat.innerHTML = '<div class="msg system">🌀 Чат очищен.</div>';
    }
    
    let savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") document.body.classList.add("light");
    
    tryAutoLogin();
    setInterval(() => { autoSaveToCloud(); }, 30000);
    setInterval(() => { if(player.inBattle && player.currentEnemy && player.currentEnemy.hp>0 && player.hp>0) enemyAttack(); }, 4000);
</script>
</body>
</html>
