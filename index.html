<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тысячи врат - Онлайн RPG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0c16;
            font-family: system-ui, monospace;
            margin: 0;
            padding: 8px;
            min-height: 100vh;
            color: #eef4ff;
        }
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            background: #03060e;
            border-radius: 28px;
            overflow: hidden;
        }
        .stats-panel {
            background: #010a17;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: bold;
            border-bottom: 1px solid #1f3a4b;
        }
        .stats-panel span { color: #f5bc70; }
        .player-name {
            background: #1f3a52;
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffd966;
        }
        .enemy-panel {
            background: #0d1a2a;
            padding: 10px;
            margin: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .chat {
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: #051020;
            font-size: 0.75rem;
        }
        .msg {
            background: #0f1a2c;
            padding: 5px 10px;
            border-radius: 18px;
            margin-bottom: 5px;
            border-left: 3px solid #4c7a9a;
        }
        .msg.system { border-left-color: #d6b356; }
        .msg.achievement { border-left-color: #6bc46b; }
        .buttons-panel {
            background: #030c17;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .buttons-panel button {
            background: #1f3a52;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .online-btn { background: #2e6e5a; }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #030c17;
            border-top: 1px solid #1a3045;
        }
        input {
            flex: 1;
            background: #0f1b2f;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .hidden { display: none; }
        .sub-panel {
            background: #0a1424;
            margin: 10px;
            border-radius: 20px;
            padding: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .login-panel {
            text-align: center;
            padding: 15px;
        }
        .login-panel input {
            width: 100%;
            margin: 8px 0;
        }
        .class-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 15px;
        }
        .class-btn {
            background: #2a3f55;
            padding: 12px;
            flex: 1;
            text-align: center;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        .select-item {
            background: #162336;
            padding: 8px;
            border-radius: 40px;
            margin: 5px;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-panel">
        <div>⚔️ <span id="className">???</span></div>
        <div>Ур.<span id="lvl">1</span></div>
        <div>❤️ <span id="hp">200</span>/<span id="maxHp">200</span></div>
        <div>🪙 <span id="gold">800</span></div>
        <div>✨ <span id="glory">0</span></div>
        <div class="player-name" id="playerNameDisplay">Не авторизован</div>
    </div>
    
    <div class="enemy-panel" id="enemyPanel" style="display: none;">
        <span>👾 <span id="enemyName"></span></span>
        <span>❤️ <span id="enemyHp"></span></span>
        <span>⚔️ <span id="enemyAtk"></span></span>
    </div>

    <div class="chat" id="chatArea">
        <div class="msg system">🌀 Нажмите ВОЙТИ или ЗАРЕГИСТРИРОВАТЬСЯ</div>
    </div>

    <div id="dynamicPanel" class="sub-panel hidden"></div>

    <div class="buttons-panel">
        <button id="loginBtn" class="online-btn">🔐 ВОЙТИ</button>
        <button id="registerBtn" class="online-btn">📝 РЕГИСТРАЦИЯ</button>
        <button id="logoutBtn">🚪 ВЫЙТИ</button>
        <button id="attackBtn">⚔️ АТАКА</button>
        <button id="healBtn">💚 ЛЕЧИТЬ</button>
        <button id="shopBtn">🏪 МАГАЗИН</button>
        <button id="questBtn">📜 БОССЫ</button>
        <button id="leaderboardBtn" class="online-btn">🏆 РЕЙТИНГ</button>
    </div>

    <div class="input-area">
        <input type="text" id="cmdInput" placeholder="статы, помощь" autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ============== ВАШИ ДАННЫЕ SUPABASE ==============
    const SUPABASE_URL = "https://tmjqafqecjpizawdruzq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanFhZnFlY2pwaXphd2RydXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk2OTYsImV4cCI6MjA5NTQ3NTY5Nn0.8K7i5QEbjYWSvqw78P8RSR_abYM8uCRZbvC9Hp12bac";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let inBattle = false;
    let currentEnemy = null;
    
    // Игрок
    let player = {
        class: null,
        level: 1,
        xp: 0,
        gold: 800,
        glory: 0,
        hp: 200,
        maxHp: 200,
        weapon: { name: "Ржавый меч", dmg: 12 },
        stats: { kills: 0 }
    };
    
    // Боссы
    const bosses = [
        { name: "Гоблин", hp: 160, atk: 28, gold: 90, xp: 45, glory: 5 },
        { name: "Тролль", hp: 290, atk: 42, gold: 150, xp: 80, glory: 8 },
        { name: "Рыцарь", hp: 450, atk: 65, gold: 240, xp: 130, glory: 12 }
    ];
    
    // Оружие
    const weapons = {
        warrior: [
            { name: "Ржавый меч", dmg: 12, cost: 0 },
            { name: "Стальной меч", dmg: 25, cost: 500 },
            { name: "Пламенный меч", dmg: 45, cost: 1500 }
        ],
        mage: [
            { name: "Деревянный посох", dmg: 10, cost: 0 },
            { name: "Магический посох", dmg: 22, cost: 500 },
            { name: "Посох огня", dmg: 40, cost: 1500 }
        ],
        archer: [
            { name: "Короткий лук", dmg: 11, cost: 0 },
            { name: "Длинный лук", dmg: 24, cost: 500 },
            { name: "Огненный лук", dmg: 42, cost: 1500 }
        ]
    };
    
    function addMsg(text, type = "system") {
        let chat = document.getElementById("chatArea");
        let div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    
    function updateUI() {
        document.getElementById("className").innerText = player.class ? player.class : "???";
        document.getElementById("lvl").innerText = player.level;
        document.getElementById("hp").innerText = Math.floor(player.hp);
        document.getElementById("maxHp").innerText = player.maxHp;
        document.getElementById("gold").innerText = Math.floor(player.gold);
        document.getElementById("glory").innerText = Math.floor(player.glory);
        
        if (inBattle && currentEnemy) {
            document.getElementById("enemyPanel").style.display = "flex";
            document.getElementById("enemyName").innerText = currentEnemy.name;
            document.getElementById("enemyHp").innerText = Math.max(0, Math.floor(currentEnemy.hp));
            document.getElementById("enemyAtk").innerText = currentEnemy.atk;
        } else {
            document.getElementById("enemyPanel").style.display = "none";
        }
        
        if (currentUser) {
            document.getElementById("playerNameDisplay").innerHTML = `👤 ${currentUser.username}`;
        } else {
            document.getElementById("playerNameDisplay").innerHTML = `Не авторизован`;
        }
    }
    
    function getDamage() {
        let dmg = player.weapon.dmg + Math.floor(player.level * 1.2);
        return dmg + Math.floor(Math.random() * 12);
    }
    
    function attack() {
        if (!inBattle || !currentEnemy) {
            addMsg("Нет боя! Выберите босса в меню БОССЫ");
            return;
        }
        
        let dmg = getDamage();
        currentEnemy.hp -= dmg;
        addMsg(`⚔️ Урон ${dmg}. У ${currentEnemy.name} осталось ${Math.max(0, Math.floor(currentEnemy.hp))} HP.`);
        
        if (currentEnemy.hp <= 0) {
            let goldGain = currentEnemy.gold + Math.floor(Math.random() * 50);
            let xpGain = currentEnemy.xp + player.level * 4;
            let gloryGain = currentEnemy.glory || 5;
            
            player.gold += goldGain;
            player.xp += xpGain;
            player.glory += gloryGain;
            player.stats.kills++;
            
            addMsg(`🏆 ПОБЕДА! +${goldGain}💰 +${xpGain}✨ +${gloryGain}⭐`, "achievement");
            
            let need = 100 + player.level * 12;
            if (player.xp >= need) {
                player.level++;
                player.xp = 0;
                player.maxHp += 20;
                player.hp = player.maxHp;
                addMsg(`✨ УРОВЕНЬ ${player.level}!`, "achievement");
            }
            
            inBattle = false;
            currentEnemy = null;
            updateUI();
            saveToCloud();
            updateLeaderboard();
        } else {
            let enemyDmg = Math.max(6, currentEnemy.atk + Math.floor(Math.random() * 14) - Math.floor(player.level * 0.3));
            player.hp -= enemyDmg;
            addMsg(`😖 ${currentEnemy.name} атакует! -${enemyDmg} HP. У вас ${Math.floor(player.hp)}/${player.maxHp}`);
            
            if (player.hp <= 0) {
                addMsg(`💀 ВЫ ПАЛИ! Потеря 20% ресурсов.`, "system");
                player.gold = Math.floor(player.gold * 0.8);
                player.glory = Math.floor(player.glory * 0.8);
                player.hp = player.maxHp;
                inBattle = false;
                currentEnemy = null;
                saveToCloud();
            }
            updateUI();
        }
    }
    
    function heal() {
        let cost = 50;
        if (player.gold >= cost && player.hp < player.maxHp) {
            player.gold -= cost;
            player.hp = Math.min(player.maxHp, player.hp + 50 + player.level);
            addMsg(`💚 Лечение +${50 + player.level} HP. -${cost}💰`);
            updateUI();
            saveToCloud();
        } else if (player.hp >= player.maxHp) {
            addMsg(`❤️ HP уже полное!`);
        } else {
            addMsg(`❌ Не хватает золота! Нужно ${cost}💰`);
        }
    }
    
    function startBattle(boss) {
        if (inBattle) {
            addMsg("Вы уже в бою!");
            return;
        }
        currentEnemy = JSON.parse(JSON.stringify(boss));
        inBattle = true;
        addMsg(`⚔️ БОЙ: ${boss.name} (❤️${boss.hp} ⚔️${boss.atk})`);
        updateUI();
    }
    
    function showBosses() {
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `<strong>📜 ВЫБЕРИ БОССА</strong><div>`;
        bosses.forEach((b, i) => {
            panel.innerHTML += `<div class="select-item" data-boss="${i}">${b.name} (❤️${b.hp} ⚔️${b.atk}) +${b.glory}⭐ +${b.gold}💰</div>`;
        });
        panel.innerHTML += `<button id="closePanel">Закрыть</button>`;
        panel.classList.remove("hidden");
        
        document.querySelectorAll("[data-boss]").forEach(el => {
            el.onclick = () => {
                let idx = parseInt(el.dataset.boss);
                startBattle(bosses[idx]);
                panel.classList.add("hidden");
            };
        });
        document.getElementById("closePanel").onclick = () => panel.classList.add("hidden");
    }
    
    function showShop() {
        if (!player.class) {
            addMsg("Сначала выберите класс при регистрации!");
            return;
        }
        let items = weapons[player.class];
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `<strong>🏪 МАГАЗИН (${player.class})</strong><div>`;
        items.forEach((w, i) => {
            let price = w.cost === 0 ? "Бесплатно" : `${w.cost}💰`;
            panel.innerHTML += `<div class="select-item" data-weapon="${i}">${w.name} +${w.dmg} урона - ${price}</div>`;
        });
        panel.innerHTML += `<button id="closePanel">Закрыть</button>`;
        panel.classList.remove("hidden");
        
        document.querySelectorAll("[data-weapon]").forEach(el => {
            el.onclick = () => {
                let idx = parseInt(el.dataset.weapon);
                let w = items[idx];
                if (w.cost === 0) {
                    player.weapon = { name: w.name, dmg: w.dmg };
                    addMsg(`✅ Выбрано стартовое оружие: ${w.name}`);
                } else if (player.gold >= w.cost) {
                    player.gold -= w.cost;
                    player.weapon = { name: w.name, dmg: w.dmg };
                    addMsg(`✅ Куплено: ${w.name}! Урон +${w.dmg}`);
                } else {
                    addMsg(`❌ Не хватает золота! Нужно ${w.cost}💰`);
                }
                updateUI();
                saveToCloud();
                panel.classList.add("hidden");
            };
        });
        document.getElementById("closePanel").onclick = () => panel.classList.add("hidden");
    }
    
    // ============== SUPABASE ФУНКЦИИ ==============
    
    async function register() {
        let name = prompt("Введите имя (3-20 символов):");
        if (!name || name.length < 3) { addMsg("❌ Имя минимум 3 символа"); return; }
        
        let pass = prompt("Введите пароль (минимум 4 символа):");
        if (!pass || pass.length < 4) { addMsg("❌ Пароль минимум 4 символа"); return; }
        
        try {
            let hash = btoa(pass);
            let { error } = await supabase.from("accounts").insert({ username: name, password_hash: hash });
            
            if (error) {
                if (error.code === "23505") addMsg("❌ Имя уже занято!");
                else addMsg("❌ Ошибка: " + error.message);
                return;
            }
            
            addMsg("✅ Регистрация успешна! Теперь войдите.", "achievement");
        } catch(e) {
            addMsg("❌ Ошибка: " + e.message);
        }
    }
    
    async function login() {
        let name = prompt("Имя:");
        if (!name) return;
        let pass = prompt("Пароль:");
        if (!pass) return;
        
        try {
            let hash = btoa(pass);
            let { data, error } = await supabase
                .from("accounts")
                .select("id, username")
                .eq("username", name)
                .eq("password_hash", hash)
                .maybeSingle();
            
            if (error || !data) {
                addMsg("❌ Неверное имя или пароль");
                return;
            }
            
            currentUser = { id: data.id, username: data.username };
            localStorage.setItem("userId", currentUser.id);
            localStorage.setItem("username", currentUser.username);
            
            addMsg(`✅ Добро пожаловать, ${currentUser.username}!`, "achievement");
            await loadGame();
            updateUI();
        } catch(e) {
            addMsg("❌ Ошибка: " + e.message);
        }
    }
    
    async function logout() {
        currentUser = null;
        localStorage.removeItem("userId");
        localStorage.removeItem("username");
        player = {
            class: null, level: 1, xp: 0, gold: 800, glory: 0, hp: 200, maxHp: 200,
            weapon: { name: "Ржавый меч", dmg: 12 }, stats: { kills: 0 }
        };
        inBattle = false;
        currentEnemy = null;
        addMsg("👋 Вы вышли");
        updateUI();
        showClassSelector();
    }
    
    async function saveToCloud() {
        if (!currentUser) return;
        try {
            await supabase.from("game_saves").upsert({
                user_id: currentUser.id,
                save_data: {
                    class: player.class,
                    level: player.level,
                    xp: player.xp,
                    gold: player.gold,
                    glory: player.glory,
                    hp: player.hp,
                    maxHp: player.maxHp,
                    weapon: player.weapon,
                    stats: player.stats
                }
            });
        } catch(e) { console.log(e); }
    }
    
    async function loadGame() {
        if (!currentUser) return;
        try {
            let { data } = await supabase
                .from("game_saves")
                .select("save_data")
                .eq("user_id", currentUser.id)
                .maybeSingle();
            
            if (data?.save_data) {
                let d = data.save_data;
                player.class = d.class;
                player.level = d.level || 1;
                player.xp = d.xp || 0;
                player.gold = d.gold || 800;
                player.glory = d.glory || 0;
                player.hp = d.hp || 200;
                player.maxHp = d.maxHp || 200;
                player.weapon = d.weapon || { name: "Ржавый меч", dmg: 12 };
                player.stats = d.stats || { kills: 0 };
                addMsg(`☁️ Прогресс загружен! Уровень ${player.level}`, "achievement");
                updateUI();
            } else {
                showClassSelector();
            }
        } catch(e) { console.log(e); }
    }
    
    async function updateLeaderboard() {
        if (!currentUser) return;
        try {
            await supabase.from("leaderboard").upsert({
                player_name: currentUser.username,
                level: player.level,
                glory: Math.floor(player.glory),
                total_kills: player.stats.kills
            });
        } catch(e) {}
    }
    
    async function showLeaderboard() {
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `<div>🏆 ЗАГРУЗКА...</div>`;
        panel.classList.remove("hidden");
        
        try {
            let { data } = await supabase
                .from("leaderboard")
                .select("*")
                .order("glory", { ascending: false })
                .limit(20);
            
            if (!data || data.length === 0) {
                panel.innerHTML = `<div>Рейтинг пуст</div><button id="closePanel">Закрыть</button>`;
            } else {
                panel.innerHTML = `<strong>🏆 ТОП-20 🏆</strong><div>`;
                data.forEach((p, i) => {
                    panel.innerHTML += `<div class="select-item">${i+1}. ${p.player_name} | Ур.${p.level} | ✨${p.glory} | 💀${p.total_kills}</div>`;
                });
                panel.innerHTML += `</div><button id="closePanel">Закрыть</button>`;
            }
            document.getElementById("closePanel").onclick = () => panel.classList.add("hidden");
        } catch(e) {
            panel.innerHTML = `<div>Ошибка</div><button id="closePanel">Закрыть</button>`;
        }
    }
    
    function showClassSelector() {
        let panel = document.getElementById("dynamicPanel");
        panel.innerHTML = `
            <div class="class-selector">
                <div class="class-btn" id="classWar">⚔️ ВОИН</div>
                <div class="class-btn" id="classMage">🔮 МАГ</div>
                <div class="class-btn" id="classArch">🏹 ЛУЧНИК</div>
            </div>
            <button id="closePanel">Закрыть</button>
        `;
        panel.classList.remove("hidden");
        
        document.getElementById("classWar").onclick = () => {
            player.class = "warrior";
            player.weapon = weapons.warrior[0];
            player.maxHp = 260;
            player.hp = 260;
            addMsg(`Вы выбрали ВОИНА! Здоровье: 260, оружие: ${player.weapon.name}`);
            updateUI();
            saveToCloud();
            panel.classList.add("hidden");
        };
        document.getElementById("classMage").onclick = () => {
            player.class = "mage";
            player.weapon = weapons.mage[0];
            player.maxHp = 180;
            player.hp = 180;
            addMsg(`Вы выбрали МАГА! Здоровье: 180, оружие: ${player.weapon.name}`);
            updateUI();
            saveToCloud();
            panel.classList.add("hidden");
        };
        document.getElementById("classArch").onclick = () => {
            player.class = "archer";
            player.weapon = weapons.archer[0];
            player.maxHp = 210;
            player.hp = 210;
            addMsg(`Вы выбрали ЛУЧНИКА! Здоровье: 210, оружие: ${player.weapon.name}`);
            updateUI();
            saveToCloud();
            panel.classList.add("hidden");
        };
        document.getElementById("closePanel").onclick = () => panel.classList.add("hidden");
    }
    
    // ============== ИНИЦИАЛИЗАЦИЯ ==============
    document.getElementById("loginBtn").onclick = login;
    document.getElementById("registerBtn").onclick = register;
    document.getElementById("logoutBtn").onclick = logout;
    document.getElementById("attackBtn").onclick = attack;
    document.getElementById("healBtn").onclick = heal;
    document.getElementById("shopBtn").onclick = showShop;
    document.getElementById("questBtn").onclick = showBosses;
    document.getElementById("leaderboardBtn").onclick = showLeaderboard;
    document.getElementById("sendBtn").onclick = () => {
        let cmd = document.getElementById("cmdInput").value;
        if (cmd === "статы") addMsg(`Ур.${player.level} ❤️${Math.floor(player.hp)}/${player.maxHp} 🪙${Math.floor(player.gold)} ✨${Math.floor(player.glory)}`);
        else if (cmd === "помощь") addMsg(`Кнопки: ВОЙТИ, РЕГИСТРАЦИЯ, АТАКА, ЛЕЧИТЬ, МАГАЗИН, БОССЫ, РЕЙТИНГ`);
        else addMsg(`❓ Неизвестно. "помощь" для списка`);
        document.getElementById("cmdInput").value = "";
    };
    
    // Автовход
    let savedId = localStorage.getItem("userId");
    let savedName = localStorage.getItem("username");
    if (savedId && savedName) {
        currentUser = { id: parseInt(savedId), username: savedName };
        loadGame();
    } else {
        showClassSelector();
    }
    
    // Атака врага
    setInterval(() => {
        if (inBattle && currentEnemy && currentEnemy.hp > 0 && player.hp > 0) {
            let enemyDmg = Math.max(6, currentEnemy.atk + Math.floor(Math.random() * 14) - Math.floor(player.level * 0.3));
            player.hp -= enemyDmg;
            addMsg(`😖 ${currentEnemy.name} атакует! -${enemyDmg} HP. У вас ${Math.floor(player.hp)}/${player.maxHp}`);
            if (player.hp <= 0) {
                addMsg(`💀 ВЫ ПАЛИ!`, "system");
                player.gold = Math.floor(player.gold * 0.8);
                player.glory = Math.floor(player.glory * 0.8);
                player.hp = player.maxHp;
                inBattle = false;
                currentEnemy = null;
                saveToCloud();
            }
            updateUI();
        }
    }, 4000);
    
    // Автосохранение
    setInterval(() => saveToCloud(), 30000);
</script>
</body>
</html>
