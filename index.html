<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тысячи врат: Текстовая RPG</title>

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c16;
            font-family: system-ui, -apple-system, monospace;
            margin: 0;
            padding: 8px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #eef4ff;
            transition: background 0.2s, color 0.2s;
        }
        body.light {
            background: #e8edf5;
            color: #1a2a3a;
        }
        body.light .game-container { background: #ffffff; box-shadow: 0 0 0 1px #c0d0e0; }
        body.light .stats-panel { background: #f0f4fa; border-bottom-color: #c0d0e0; color: #1a2a3a; }
        body.light .stats-panel span { color: #c97e00; }
        body.light .chat { background: #f5f7fc; }
        body.light .msg { background: #e8edf5; border-left-color: #4c7a9a; color: #1a2a3a; }
        body.light .msg.system { background: #e0e8f0; border-left-color: #d6b356; }
        body.light .enemy-panel { background: #e0e8f0; color: #1a2a3a; }
        body.light .buttons-panel { background: #f0f4fa; border-color: #c0d0e0; }
        body.light .buttons-panel button { background: #4c7a9a; color: white; }
        body.light .input-area { background: #f0f4fa; border-color: #c0d0e0; }
        body.light input { background: #ffffff; color: #1a2a3a; border: 1px solid #c0d0e0; }
        body.light .sub-panel { background: #f0f4fa; }
        body.light .select-item, body.light .shop-item, body.light .craft-item { background: #e0e8f0; color: #1a2a3a; }
        .game-container {
            max-width: 700px;
            margin: 0 auto;
            background: #03060e;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            width: 100%;
            box-shadow: 0 0 0 1px #2a3f55;
            overflow: hidden;
            position: relative;
        }
        .stats-panel {
            background: #010a17;
            padding: 8px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: bold;
            border-bottom: 1px solid #1f3a4b;
            position: relative;
        }
        .stats-panel span { color: #f5bc70; }
        .version-badge {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 0.55rem;
            color: #6a8aaa;
            opacity: 0.7;
            font-weight: normal;
        }
        .enemy-panel {
            background: #0d1a2a;
            padding: 8px;
            margin: 6px 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .chat {
            max-height: 35vh;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #051020;
            font-size: 0.8rem;
        }
        .msg {
            background: #0f1a2c;
            padding: 6px 10px;
            border-radius: 18px;
            word-wrap: break-word;
            border-left: 3px solid #4c7a9a;
            align-self: flex-start;
            max-width: 94%;
        }
        .msg.system { background: #121e2e; border-left-color: #d6b356; }
        .msg.achievement { background: #1a2a1a; border-left-color: #6bc46b; }
        .buttons-panel {
            background: #030c17;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border-top: 1px solid #1a3045;
            border-bottom: 1px solid #1a3045;
        }
        .buttons-panel button {
            background: #1f3a52;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 8px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: center;
        }
        .buttons-panel button:active { transform: scale(0.96); background: #2c5a7a; }
        .active-mode { background: #4c7a9a !important; box-shadow: 0 0 6px #7ab3c8; }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #030c17;
            border-top: 1px solid #1a3045;
        }
        input {
            flex: 1;
            background: #0f1b2f;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        button { background: #2c4f6e; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .hidden { display: none; }
        .sub-panel {
            background: #0a1424;
            margin: 5px 10px;
            border-radius: 20px;
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .class-selector { display: flex; gap: 12px; justify-content: center; margin: 10px; }
        .class-btn { background: #2a3f55; padding: 12px; flex: 1; text-align: center; border-radius: 60px; font-weight: bold; cursor: pointer; }
        .select-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; max-height: 150px; overflow-y: auto; }
        .select-item { background: #162336; padding: 6px 10px; border-radius: 40px; cursor: pointer; margin: 2px; font-size: 0.7rem; }
        .craft-item { background: #162336; padding: 6px; border-radius: 16px; margin: 4px; cursor: pointer; }
        .craft-recipe { font-size: 0.6rem; color: #aac8ff; }
        .craft-damage { font-size: 0.65rem; color: #ffaa66; font-weight: bold; margin-left: 6px; }
        .shop-item { background: #162336; padding: 6px 10px; border-radius: 40px; margin: 3px; cursor: pointer; font-size: 0.7rem; display: flex; justify-content: space-between; }
        hr { border-color: #2e4b6e; margin: 5px; }
        .promo-btn, .theme-btn { background: #4a2e6e; grid-column: span 2; margin-top: 4px; }
        .upgrade-btn { background: #8b5e3c; }
        .theme-btn { background: #2e5a6e; }
        .glory { color: #ffd966; }
        .daily-boss-btn { background: #8b5e3c; }
    </style>
</head>

    function upgradeWeapon() {
        if (!player.class) { addSys("❌ Сначала выберите класс!"); return; }
        if (!player.weapon) { addSys("❌ У вас нет оружия для улучшения!"); return; }
        
        let currentDmg = player.weapon.dmg;
        let upgradeCost = Math.max(30, Math.floor(currentDmg * 1.5));
        
        if (player.glory < upgradeCost) {
            addSys(`❌ Не хватает осколков славы! Нужно ${upgradeCost}✨, у вас ${Math.floor(player.glory)}✨`);
            return;
        }
        
        let roll = Math.random() * 100;
        
        if (roll < 70) {
            player.glory -= upgradeCost;
            let oldDmg = player.weapon.dmg;
            player.weapon.dmg = Math.floor(player.weapon.dmg + 3);
            addSys(`✅ УСПЕХ! ${player.weapon.name} улучшен с ${oldDmg} до ${player.weapon.dmg} урона! -${upgradeCost}✨`, "achievement");
        } 
        else if (roll < 90) {
            addSys(`⚠️ НЕУДАЧА! Оружие не улучшилось, но осколки славы не потрачены (${upgradeCost}✨ сохранены).`);
            return;
        }
        else {
            player.glory -= upgradeCost;
            let oldWeaponName = player.weapon.name;
            let defaultWeapon = WEAPONS[player.class][0];
            player.weapon = { name: defaultWeapon.name, dmg: defaultWeapon.dmg };
            addSys(`💥 КРИТИЧЕСКАЯ НЕУДАЧА! ${oldWeaponName} сломалось! Вы потеряли ${upgradeCost}✨ и вернулись к ${player.weapon.name} (+${player.weapon.dmg} урона)`);
            updateUI();
            saveGame();
            return;
        }
        
        updateUI();
        saveGame();
    }

    function checkAchievements() {
        if (!achievements.kills.claimed && achievements.kills.current >= achievements.kills.target) {
            achievements.kills.claimed = true;
            player.gold += achievements.kills.reward.gold;
            player.glory += achievements.kills.reward.glory;
            addSys(`🏆 Достижение "${achievements.kills.name}"! +${achievements.kills.reward.gold}💰 +${achievements.kills.reward.glory}✨`, "achievement");
        }
        if (!achievements.eliteKills.claimed && achievements.eliteKills.current >= achievements.eliteKills.target) {
            achievements.eliteKills.claimed = true;
            player.gold += achievements.eliteKills.reward.gold;
            player.glory += achievements.eliteKills.reward.glory;
            addSys(`🏆 Достижение "${achievements.eliteKills.name}"! +${achievements.eliteKills.reward.gold}💰 +${achievements.eliteKills.reward.glory}✨`, "achievement");
        }
        if (!achievements.crafts.claimed && achievements.crafts.current >= achievements.crafts.target) {
            achievements.crafts.claimed = true;
            player.gold += achievements.crafts.reward.gold;
            player.glory += achievements.crafts.reward.glory;
            addSys(`🏆 Достижение "${achievements.crafts.name}"! +${achievements.crafts.reward.gold}💰 +${achievements.crafts.reward.glory}✨`, "achievement");
        }
        if (!achievements.level.claimed && player.level >= achievements.level.target) {
            achievements.level.claimed = true;
            player.gold += achievements.level.reward.gold;
            player.glory += achievements.level.reward.glory;

        }
        updateUI();
        saveGame();
    }

    function checkDailyWeeklyProgress(type, amount = 1) {
        dailyQuests.forEach(q => { if (!q.claimed && q.type === type) { q.current += amount; if (q.current >= q.target) addSys(`📅 Ежедневное задание выполнено: ${q.name}! Забери награду в меню заданий.`); } });
        weeklyQuests.forEach(q => { if (!q.claimed && q.type === type) { q.current += amount; if (q.current >= q.target) addSys(`📆 Еженедельное задание выполнено: ${q.name}! Забери награду в меню заданий.`); } });
        saveGame();
    }

    function getDamage() { return (player.weapon ? player.weapon.dmg : 10) + Math.floor(player.level * 1.2) + Math.floor(Math.random() * 12); }
    
    function attack() { if (!player.inBattle || !player.currentEnemy) { addSys("Нет боя!"); return; }
        let dmg = getDamage(); player.currentEnemy.hp -= dmg; addSys(`⚔️ Урон ${dmg}. У ${player.currentEnemy.name} осталось ${Math.max(0, Math.floor(player.currentEnemy.hp))} HP.`);
        if (player.currentEnemy.hp <= 0) { defeatEnemy(); } updateUI(); saveGame(); }
    
    function defeatEnemy() {
        let goldGain = player.currentEnemy.gold + Math.floor(Math.random() * 60);
        let xpGain = player.currentEnemy.xp + player.level * 4;
        let gloryGain = player.currentEnemy.glory || 5;
        player.gold += goldGain; player.xp += xpGain; player.glory += gloryGain;
        player.stats.totalGoldEarned += goldGain;
        player.stats.totalKills++;
        if (player.currentEnemy.needKey) player.stats.eliteKills++;
        achievements.gold.current = player.stats.totalGoldEarned;
        achievements.kills.current = player.stats.totalKills;
        achievements.eliteKills.current = player.stats.eliteKills;
        addSys(`🏆 Победа! +${goldGain}💰 +${xpGain}✨ опыта +${gloryGain}✨ славы!`);
        
        checkDailyWeeklyProgress("kill", 1);
        checkDailyWeeklyProgress("gold", goldGain);
        if (player.currentEnemy.needKey) checkDailyWeeklyProgress("elite", 1);
        
        let need = 100 + player.level * 12;
        if (player.xp >= need) { player.level++; player.xp = 0; player.maxHp += 20; player.hp = player.maxHp; addSys(`✨ УРОВЕНЬ ${player.level}!`); checkAchievements(); }
        if (player.currentEnemy.key) { let r = Math.random(); if (r < player.currentEnemy.keyChance) { player.keys[player.currentEnemy.key]++; addSys(`🔑 Выпал ${player.currentEnemy.key}!`); } }
        if (player.currentEnemy.drops) {
            for (let d of player.currentEnemy.drops) {
                if (Math.random() < d.chance) {
                    if (d.material) { player.materials[d.material] = (player.materials[d.material] || 0) + d.qty; addSys(`📦 Материал: +${d.qty} ${d.material}`); }
                    if (d.weapon && player.class === d.class) { let w = WEAPONS[player.class].find(w=>w.name === d.weapon); if(w && (!player.weapon || w.dmg > player.weapon.dmg)) { player.weapon = w; addSys(`⚔️ ВЫ ПОДОБРАЛИ ${w.name}!`); } }
                }
            }
        }
        player.inBattle = false; if (player.attackInterval) clearInterval(player.attackInterval); player.currentEnemy = null; updateUI(); saveGame(); checkAchievements();
    }
    
    function enemyAttack() { if (!player.inBattle || !player.currentEnemy) return;
        let dmg = Math.max(6, player.currentEnemy.atk + Math.floor(Math.random() * 14) - Math.floor(player.level * 0.3));
        player.hp -= dmg; addSys(`😖 ${player.currentEnemy.name} атакует! -${dmg} HP. Осталось ${Math.floor(player.hp)}/${player.maxHp}`);
        if (player.hp <= 0) { addSys(`💀 Вы пали... Потеря 20% золота и славы.`); player.gold = Math.floor(player.gold * 0.8); player.glory = Math.floor(player.glory * 0.8); player.hp = player.maxHp; player.inBattle = false; if(player.attackInterval) clearInterval(player.attackInterval); player.currentEnemy = null; }
        updateUI(); saveGame();
    }

    function heal() { let cost = 45; if (player.gold >= cost && player.hp < player.maxHp) { player.gold -= cost; player.hp = Math.min(player.maxHp, player.hp + 40 + player.level); addSys(`💚 Лечение +${40+player.level} HP. -${cost}💰.`); } else addSys(`❌ Не хватает.`); updateUI(); saveGame(); }

            dailyBoss = {

                atk: baseAtk, 
                gold: 1500 + player.level * 50, 
                xp: 600 + player.level * 20,

        else if (lower === "лучник") addSys(`🏹 Лучник: сбалансированный класс (210 HP, 60 MP). Оружие — луки и арбалеты.`);

            let weapon = WEAPONS[player.class]?.find(w => w.name.toLowerCase().includes(lower));
            if (weapon) addSys(`ℹ️ ${weapon.name}: урон +${weapon.dmg}, цена ${weapon.cost}💰. ${weapon.desc || "Нет описания."}`);

    function activatePromo(code) {
        let found = PROMO_CODES.find(p => p.code.toLowerCase() === code.toLowerCase());
        if (!found) { addSys(`❌ Промокод "${code}" не найден!`); return false; }
        if (player.usedPromoCodes.includes(found.code)) { addSys(`⚠️ Промокод "${found.name}" уже был активирован!`); return false; }
        let rewardsMsg = [];
        if (found.money) { player.gold += found.money; rewardsMsg.push(`💰 ${found.money} золота`); }
        if (found.exp) { player.xp += found.exp; rewardsMsg.push(`✨ ${found.exp} опыта`); }
        if (found.glory) { player.glory += found.glory; rewardsMsg.push(`✨ ${found.glory} славы`); }
        if (found.health) { player.hp = Math.min(player.maxHp, player.hp + found.health); rewardsMsg.push(`❤️ +${found.health} здоровья`); }
        if (found.mana) { player.mp = Math.min(player.maxMp, player.mp + found.mana); rewardsMsg.push(`💙 +${found.mana} маны`); }
        if (found.keyBonus && found.keyQty) { player.keys[found.keyBonus] += found.keyQty; rewardsMsg.push(`🔑 ${found.keyQty}x ${found.keyBonus}`); }
        if (found.materialBonus && found.materialQty) { player.materials[found.materialBonus] += found.materialQty; rewardsMsg.push(`📦 ${found.materialQty}x ${found.materialBonus}`); }
        addSys(`🎉 Промокод "${found.name}" активирован! +${rewardsMsg.join(", ")}`);
        player.usedPromoCodes.push(found.code);
        let need = 100 + player.level * 12;
        while (player.xp >= need) { player.level++; player.xp -= need; player.maxHp += 20; player.hp = player.maxHp; addSys(`✨ УРОВЕНЬ ${player.level}!`); need = 100 + player.level * 12; }
        if (player.hp > player.maxHp) player.hp = player.maxHp;
        if (player.mp > player.maxMp) player.mp = player.maxMp;
        updateUI(); saveGame(); return true;
    }

    function processCmd(cmd) { 
        let c = cmd.toLowerCase().trim();
        if (c === "очистить") { clearChat(); return; }
        if (c.startsWith("инфо")) {
            let arg = cmd.substring(4).trim();
            infoCommand(arg);
            return;
        }
        let foundPromo = PROMO_CODES.find(p => p.code.toLowerCase() === c);
        if (foundPromo) { activatePromo(foundPromo.code); return; }
        if(c === "статы") statsCmd();
        else if(c === "помощь") addSys(`Команды: статы, инфо [воин/маг/лучник/оружие], очистить, промокод | Версия ${GAME_VERSION}`);
        else if(c === SECRET_BOSS_COMMAND) secretBoss();
        else addSys(`❓ Неизвестно. Введите "помощь".`); 
    }
    
    function saveGame() { 
        localStorage.setItem("TV_SAVE_FULL", JSON.stringify({ 
            version: GAME_VERSION, class:player.class, level:player.level, xp:player.xp, gold:player.gold, glory:player.glory,
            hp:player.hp, maxHp:player.maxHp, mp:player.mp, maxMp:player.maxMp, weapon:player.weapon,
            keys:player.keys, materials:player.materials, usedPromoCodes:player.usedPromoCodes,
            stats:player.stats, achievements, dailyQuests, weeklyQuests, lastDailyBossDate
        })); 
    }
    
    function loadGame() {
        let raw = localStorage.getItem("TV_SAVE_FULL");
        if(raw){ 
            let d=JSON.parse(raw); 
            player.class=d.class; player.level=d.level; player.xp=d.xp; player.gold=d.gold; player.glory=d.glory||0;
            player.hp=d.hp; player.maxHp=d.maxHp; player.mp=d.mp; player.maxMp=d.maxMp; player.weapon=d.weapon;
            player.keys=d.keys||player.keys; player.materials=d.materials||player.materials;
            player.usedPromoCodes=d.usedPromoCodes||[];
            player.stats=d.stats||{ totalKills:0, eliteKills:0, totalCrafts:0, totalGoldEarned:0 };
            if(d.achievements) Object.assign(achievements, d.achievements);
            if(d.dailyQuests) dailyQuests.forEach((q,i)=> { if(d.dailyQuests[i]) q.current=d.dailyQuests[i].current; q.claimed=d.dailyQuests[i].claimed; });
            if(d.weeklyQuests) weeklyQuests.forEach((q,i)=> { if(d.weeklyQuests[i]) q.current=d.weeklyQuests[i].current; q.claimed=d.weeklyQuests[i].claimed; });
            lastDailyBossDate = d.lastDailyBossDate || "";
            addSys(`📀 Загружено. Версия сохранения: ${d.version || "старая"}`); updateUI(); 
        } else { 
            document.getElementById("dynamicPanel").innerHTML=`<div class="class-selector"><div class="class-btn" id="classWar">⚔️ ВОИН</div><div class="class-btn" id="classMage">🔮 МАГ</div><div class="class-btn" id="classArch">🏹 ЛУЧНИК</div></div>`; 
            document.getElementById("dynamicPanel").classList.remove("hidden"); 
            document.getElementById("classWar").onclick=()=>{setClass("warrior"); document.getElementById("dynamicPanel").classList.add("hidden");};
            document.getElementById("classMage").onclick=()=>{setClass("mage"); document.getElementById("dynamicPanel").classList.add("hidden");};
            document.getElementById("classArch").onclick=()=>{setClass("archer"); document.getElementById("dynamicPanel").classList.add("hidden");};
        }
        let savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light") document.body.classList.add("light");
        updateUI();
    }
    
    // Привязка кнопок
    document.getElementById("questBtn").onclick=()=>{if(player.class) showQuests(); else addSys("Выберите класс!");};
    document.getElementById("bossListBtn").onclick=()=>{if(player.class) showBosses(); else addSys("Выберите класс!");};
    const dailyBtn = document.getElementById("dailyBossBtn");
    if (dailyBtn) dailyBtn.onclick = () => dailyBossFight();
    document.getElementById("attackBtn").onclick=attack;
    document.getElementById("autoAttackBtn").onclick=toggleAutoAttack;
    document.getElementById("healBtn").onclick=heal;
    document.getElementById("autoHealBtn").onclick=toggleAutoHeal;
    document.getElementById("shopBtn").onclick=shop;
    document.getElementById("gloryShopBtn").onclick=gloryShop;
    document.getElementById("inventoryBtn").onclick=showInventory;
    document.getElementById("craftBtn").onclick=showCraft;
    document.getElementById("upgradeBtn").onclick=showUpgradeMenu;
    document.getElementById("achievementsBtn").onclick=showAchievements;
    document.getElementById("dailyQuestsBtn").onclick=showDailyQuests;
    document.getElementById("promoBtn").onclick=showPromoUI;
    document.getElementById("themeBtn").onclick=toggleTheme;
    document.getElementById("sendBtn").onclick=()=>{ let inp=document.getElementById("cmdInput"); processCmd(inp.value); inp.value=""; };
    loadGame();
    setInterval(()=>{ if(player.inBattle && player.currentEnemy && player.currentEnemy.hp>0 && player.hp>0) enemyAttack(); }, 4000);
</script>
</body>
</html>
